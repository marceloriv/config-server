spring:
  datasource:
    url: jdbc:mysql://${data.mysql.host:localhost}:${data.mysql.port:3306}/${data.mysql.database:eventos_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${data.mysql.username:root}
    password: ${data.mysql.password:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      "[hibernate.format_sql]": true
server:
  port: 8084
