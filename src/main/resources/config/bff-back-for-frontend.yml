server:
  port: 8081

spring:
  application:
    name: bff-back-for-frontend

  # Redis (para sesiones/cache si es necesario)
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:ticketti-secret-key-2024-for-jwt-signing-and-verification-only}
  issuer: ${JWT_ISSUER:bff-back-for-frontend}
  audience: ${JWT_AUDIENCE:ticketti-client}
  expiration: ${JWT_EXPIRATION:86400000} # 24 horas en milisegundos

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

# Logging
logging:
  level:
    root: INFO
    com.ticketti: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
