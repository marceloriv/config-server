server:
  port: 8081

spring:
  application:
    name: bff-back-for-frontend

  # Redis (para sesiones/cache si es necesario)
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

gateway:
  base-url: ${GATEWAY_BASE_URL:http://localhost:8222}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:ticketti-secret-key-2024-for-jwt-signing-and-verification-only}
  issuer: ${JWT_ISSUER:bff-back-for-frontend}
  audience: ${JWT_AUDIENCE:ticketti-client}
  expiration: ${JWT_EXPIRATION:86400000} # 24 horas en milisegundos

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    # Intervalo de actualización del registro (en milisegundos)
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    # Intervalo de heartbeat (en segundos)
    lease-renewal-interval-in-seconds: 5
    # Tiempo de expiración (en segundos)
    lease-expiration-duration-in-seconds: 15
    # Status page URL
    status-page-url-path: /actuator/health
    health-check-url-path: /actuator/health

# Logging
logging:
  level:
    root: INFO
    com.ticketti: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
